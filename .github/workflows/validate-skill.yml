name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Frontmatter, links, lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Validate SKILL.md frontmatter and workflow references
        run: python3 .github/scripts/validate_skill.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: markdownlint (strict; see .github/markdownlint-config.json)
        run: |
          npx --yes markdownlint-cli \
            --config .github/markdownlint-config.json \
            --ignore node_modules \
            "**/*.md"
